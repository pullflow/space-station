# 🛰️ Space Station - Tmux Config

set -g default-terminal "screen-256color"
set -s escape-time 0
set -g history-limit 50000
set -g mouse on
set -g status-keys emacs
set -g focus-events on

# --- Plugin Manager (local) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$SS_PLUGINS_DIR/"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'erikw/tmux-dark-notify'
set -g @plugin 'olimorris/tmux-pomodoro-plus'

# --- Catppuccin ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_status_left_separator "█"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "pomodoro_plus date_time"
set -g @catppuccin_date_time_text "%H:%M  %Y-%m-%d"

# --- Dark Notify (switches catppuccin flavor on macOS theme change) ---
set -g @dark-notify-theme-path-light "$SS_PLUGINS_DIR/tmux/catppuccin-latte.tmuxtheme"
set -g @dark-notify-theme-path-dark "$SS_PLUGINS_DIR/tmux/catppuccin-mocha.tmuxtheme"

# --- Pomodoro ---
set -g @pomodoro_on " 🍅"
set -g @pomodoro_complete " ✅"
set -g @pomodoro_pause " ⏸️ "
set -g @pomodoro_prompt_pomodoro " Start? "
set -g @pomodoro_prompt_break " Break? "
set -g @pomodoro_mins 25
set -g @pomodoro_break_mins 5
set -g @pomodoro_notifications 'on'

# --- Key Bindings ---
bind r source-file /tmp/ss-tmux.conf \; display "Config reloaded."
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Initialize TPM (must be last)
run "$SS_PLUGINS_DIR/tpm/tpm"
