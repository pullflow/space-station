# 🛰️ Space Station - Tmux Config

set -g default-terminal "screen-256color"
set -s escape-time 0
set -g history-limit 50000
set -g mouse on
set -g status-keys emacs
set -g focus-events on

# --- Plugin Manager (local) ---
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$SS_PLUGINS_DIR/"

# --- Catppuccin (v2 — run directly, not via TPM) ---
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{b:pane_current_path}"
set -g status-left-length 60
set -g @catppuccin_date_time_text "%H:%M  %Y-%m-%d"

run "$SS_PLUGINS_DIR/tmux/catppuccin.tmux"

# Status bar (must be set after running catppuccin)
set -g status-left ""
set -agF status-left "#[fg=#{@thm_mauve},bold]  SPACE STATION #[fg=#{@thm_overlay_0},nobold]│ "
set -agF status-left "#{E:@catppuccin_status_session}"
set -g status-right ""
set -agF status-right "#{E:@catppuccin_status_pomodoro_plus}"
# CPU/RAM icons (Nerd Fonts glyphs)
set -g @cpu_low_icon "󰻠"
set -g @cpu_medium_icon "󰻠"
set -g @cpu_high_icon "󰻠"
set -g @ram_low_icon "󰍛"
set -g @ram_medium_icon "󰍛"
set -g @ram_high_icon "󰍛"

set -ag status-right "#[fg=#{@thm_yellow}] #($SS_PLUGINS_DIR/tmux-cpu/scripts/cpu_icon.sh) #($SS_PLUGINS_DIR/tmux-cpu/scripts/cpu_percentage.sh)  #($SS_PLUGINS_DIR/tmux-cpu/scripts/ram_icon.sh) #($SS_PLUGINS_DIR/tmux-cpu/scripts/ram_percentage.sh) "
set -agF status-right "#{E:@catppuccin_status_date_time}"

# --- Dark Notify (switches catppuccin flavor on macOS theme change) ---
set -g @dark-notify-theme-path-light "$SS_PLUGINS_DIR/tmux/catppuccin-latte.tmuxtheme"
set -g @dark-notify-theme-path-dark "$SS_PLUGINS_DIR/tmux/catppuccin-mocha.tmuxtheme"

# --- Pomodoro ---
set -g @pomodoro_on " 🍅"
set -g @pomodoro_complete " ✅"
set -g @pomodoro_pause " ⏸️ "
set -g @pomodoro_prompt_pomodoro " Start? "
set -g @pomodoro_prompt_break " Break? "
set -g @pomodoro_mins 25
set -g @pomodoro_break_mins 5
set -g @pomodoro_notifications 'on'

# --- Key Bindings ---
bind r source-file /tmp/ss-tmux.conf \; display "Config reloaded."
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Plugins (vendored, no TPM) ---
run "$SS_PLUGINS_DIR/tmux-pomodoro-plus/pomodoro.tmux"
run "$SS_PLUGINS_DIR/tmux-dark-notify/main.tmux"
