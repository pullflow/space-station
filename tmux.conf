# 🛸 Space Station Local tmux Config
# Launch with: tmux -f ./tmux.conf

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# --- Status Bar Appearance ---
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "left"

# Colors
set -g status-style "bg=black,fg=white"

# Left Side: [Session Name] | Window Name
set -g status-left-length 60
set -g status-left "#[fg=green,bold] #S #[fg=white,nobold]| #[fg=blue] #W "

# Right Side: CPU/Mem Load | Day | Date | Time
set -g status-right-length 100
set -g status-right "#[fg=magenta]#(tmux-mem-cpu-load --interval 2) #[fg=white]| #[fg=yellow]%a #[fg=white]| #[fg=cyan]%Y-%m-%d #[fg=white]| #[fg=yellow,bold]%H:%M "

# --- Key Bindings ---
# Reload config quickly
bind r source-file ./tmux.conf \; display "Space Station Config Reloaded!"

# Initialize TPM (Plugin Manager)
run '~/.tmux/plugins/tpm/tpm'
