# 🛰️ Space Station Control Panel config
# Launch with: tmux -f ./tmux.conf

# --- General ---
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 10000

# --- Key Bindings ---
bind r source-file ./tmux.conf \; display "🛰️  Command Center Reloaded!"

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Switch panes using Alt-arrow
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# --- Status Bar (The Footer) ---
set-option -g status on
set-option -g status-interval 2
set-option -g status-justify "left"
set-option -g status-position bottom

# Colors
set -g status-style "bg=black,fg=white"

# Left Side: 🛰️ Space Station | [Session] | [Window]
set -g status-left-length 100
set -g status-left "#[fg=cyan,bold] 🛰️  Space Station #[fg=white,nobold]| #[fg=green,bold] #S #[fg=white,nobold]| #[fg=blue] #W "

# Right Side: Git Branch/Status | CPU/Mem Load | Time 🛸
set -g status-right-length 150
# Uses a simple git status command that works in the background
set -g status-right "#[fg=cyan,bold] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null || echo 'none') #[fg=yellow]#(cd #{pane_current_path}; git status --short 2>/dev/null | wc -l | tr -d ' ' | xargs -I {} bash -c 'if [ \"{}\" -gt 0 ]; then echo \"[+{}\]\"; fi') #[fg=white,dim]v2.0.0 #[fg=white,nodim]| #[fg=magenta]#(tmux-mem-cpu-load --interval 2 --graph-lines 0) #[fg=white]| #[fg=yellow,bold]%H:%M #[fg=cyan]🛸 "

# Window Status Style
setw -g window-status-format "#[fg=white,bg=black] #I:#W "
setw -g window-status-current-format "#[fg=black,bg=cyan,bold] #I:#W "

# Pane Borders
set -g pane-border-style "fg=black"
set -g pane-active-border-style "fg=cyan"

# --- Plugins ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'
